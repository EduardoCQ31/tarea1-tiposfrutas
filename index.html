<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conoce tu Fruta</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🍎🍊</span>
                <h1>Conoce tu <span class="highlight">Fruta</span></h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <section class="upload-section">
            <h2>Sube una foto de la fruta</h2>
            
            <!-- Contenedor principal: Upload + Resultado lado a lado -->
            <div class="main-container">
                <!-- Lado Izquierdo: Área de Upload -->
                <div class="left-panel">
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <label for="fileInput" class="upload-label">
                            <div class="camera-icon">📷</div>
                            <p class="upload-text">Subir Foto de la Fruta</p>
                            <p class="upload-hint">Selecciona o arrastra una imagen aquí</p>
                        </label>
                    </div>
                </div>

                <!-- Lado Derecho: Resultado + Info -->
                <div class="right-panel">
                    <!-- Área de Imagen -->
                    <div class="result-area" id="resultArea" style="display: none;">
                        <img id="fruitImage" src="" alt="Fruta" class="fruit-image">
                    </div>

                    <!-- Info Rápida (Nombre y Tipo) -->
                    <div id="quickInfoPanel" class="quick-info-panel" style="display: none;">
                        <h3 id="fruitName">Fruta</h3>
                        <p id="fruitType" class="fruit-type">Tipo: -</p>
                    </div>
                </div>
            </div>

            <!-- Botón Analizar -->
            <button id="analyzeBtn" class="analyze-btn" style="display: none;">Analizar Fruta</button>

            <!-- Mensaje de Error -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </section>

        <!-- Grid de Información (4 cards) -->
        <section id="infoSection" class="info-section" style="display: none;">
            <div class="info-grid">
                <!-- Origen -->
                <div class="info-card">
                    <div class="card-icon">🌍</div>
                    <h4>Origen</h4>
                    <p id="fruitOrigen"></p>
                </div>

                <!-- Proceso de Producción -->
                <div class="info-card">
                    <div class="card-icon">🌳</div>
                    <h4>Proceso de Producción</h4>
                    <p id="fruitProceso"></p>
                </div>

                <!-- Cuidados Específicos -->
                <div class="info-card">
                    <div class="card-icon">💧</div>
                    <h4>Cuidados Específicos</h4>
                    <p id="fruitCuidados"></p>
                </div>

                <!-- Historia -->
                <div class="info-card">
                    <div class="card-icon">📜</div>
                    <h4>Historia</h4>
                    <p id="fruitHistoria"></p>
                </div>
            </div>

            <!-- Botón Nueva Búsqueda -->
            <button id="newSearchBtn" class="new-search-btn">Nueva Búsqueda</button>
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
